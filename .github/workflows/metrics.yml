name: Metrics

on:
  # Refresh the stats SVG once a day
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever the workflow itself changes
  push:
    branches: ["main"]
    paths: [".github/workflows/metrics.yml"]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Overview card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: pruthvirajsinhpunada
          filename: github-metrics.svg
          template: classic
          base: header, repositories, metadata
          config_timezone: Europe/Rome
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: pruthvirajsinhpunada
          filename: github-calendar.svg
          template: classic
          base: ""
          config_timezone: Europe/Rome
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
